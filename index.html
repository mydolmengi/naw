<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>따까리 계약서</title>
<style>
body {
  font-family: sans-serif;
  background: #f0f0f0;
  text-align: center;
  padding: 30px;
}
.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
button {
  padding: 10px 20px;
  margin-top: 20px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}
.hidden { display: none; }
input[type="text"] {
  padding: 10px;
  width: 80%;
  margin-top: 10px;
}
label {
  display: block;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="box" id="start">
  <h2>⚠️ 시스템 접속 ⚠️</h2>
  <p>동생 관리 시스템에 접근 중...</p>
  <button onclick="next()">접속하기</button>
</div>

<div class="box hidden" id="contract">
  <h3>📜 따까리 계약서</h3>
  <p>본 계약은 아래 조항에 따라 한정희와 따까리 간에 체결된다.</p>

  <label><input type="checkbox" class="chk"> 제1조: 심부름 요청 시 즉시 수행한다</label>
  <label><input type="checkbox" class="chk"> 제2조: 간식 발견 시 형(누나)에게 먼저 보고한다</label>
  <label><input type="checkbox" class="chk"> 제3조: 말대꾸는 하루 1회 이하로 제한한다</label>
  <label><input type="checkbox" class="chk"> 제4조: 게임 같이 하자 하면 거절하지 않는다</label>
  <label><input type="checkbox" class="chk"> 제5조: 가끔은 착한 동생 모드로 전환한다</label>
  <label><input type="checkbox" class="chk"> 제6조: 사실 형(누나) 좋아한다는 걸 인정한다</label>

  <button onclick="checkAll()">다 확인했음</button>
</div>

<div class="box hidden" id="sign">
  <h3>✍️ 서명 단계</h3>
  <p>본 계약에 동의하면 이름을 입력하시오</p>
  <input type="text" id="name" placeholder="이름 입력">
  <br>
  <button onclick="finish()">서명하기</button>
</div>

<div class="box hidden" id="end">
  <h2>✔ 계약 완료</h2>
  <p id="result"></p>
  <p>(이 계약은 평생 유지됩니다 😏)</p>
</div>

<script>
function next() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("contract").classList.remove("hidden");
}

function checkAll() {
  let checks = document.querySelectorAll(".chk");
  let allChecked = true;

  checks.forEach(chk => {
    if (!chk.checked) allChecked = false;
  });

  if (!allChecked) {
    alert("모든 조항에 동의해야 합니다 😏");
    return;
  }

  document.getElementById("contract").classList.add("hidden");
  document.getElementById("sign").classList.remove("hidden");
}

function finish() {
  let name = document.getElementById("name").value;

  if (name === "") {
    alert("이름을 입력하세요");
    return;
  }

  document.getElementById("sign").classList.add("hidden");
  document.getElementById("end").classList.remove("hidden");

  document.getElementById("result").innerText =
    name + " 님은 이제 공식 따까리로 인정되었습니다 🎉";
}
</script>

</body>
</html>
