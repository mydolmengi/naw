<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>따까리 계약서</title>

<style>
body {
  font-family: sans-serif;
  background: #f0f0f0;
  text-align: center;
  padding: 30px;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding: 10px 20px;
  margin-top: 20px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

.hidden {
  display: none !important;
}

input[type="text"] {
  padding: 10px;
  width: 80%;
  margin-top: 10px;
}

label {
  display: block;
  margin: 10px 0;
}

/* 팝업 */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

/* 흔들림 */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.3s;
}
</style>
</head>

<body>

<div class="box" id="start">
  <h2>⚠️ 시스템 접속 ⚠️</h2>
  <p>동생 관리 시스템에 접근 중...</p>
  <button onclick="next()">접속하기</button>
</div>

<div class="box hidden" id="contract">
  <h3>📜 따까리 계약서</h3>
  <p>본 계약은 아래 조항에 따라 정희언니님과 따까리 간에 체결된다.</p>

  <label><input type="checkbox" class="chk"> 제1조: 언니가 명령 시 즉시 수행한다</label>
  <label><input type="checkbox" class="chk"> 제2조: 맛있는건 언니에게 먼저 준다</label>
  <label><input type="checkbox" class="chk"> 제3조: 언니를 매번 기쁘게 만든다</label>
  <label><input type="checkbox" class="chk"> 제4조: 언니에게 맛있는거 자주 사준다</label>
  <label><input type="checkbox" class="chk"> 제5조: 매순간 착한 동생 모드로 전환한다</label>
  <label><input type="checkbox" class="chk"> 제6조: 언니는 정희언니 밖에 없다는 걸 인정한다</label>


  <button onclick="checkAll()">다 확인했음</button>
</div>

<div class="box hidden" id="sign">
  <h3>✍️ 서명 단계</h3>
  <p>본 계약에 동의하면 이름을 입력하시오</p>
  <input type="text" id="name" placeholder="이름 입력">
  <br>
  <button onclick="finish()">서명하기</button>
</div>

<div class="box hidden" id="end">
  <h2>✔ 계약 완료</h2>
  <p id="result"></p>
  <p>(이 계약은 평생 유지됩니다 😏)</p>
</div>

<!-- 체크 안 했을 때 팝업 -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <p>⚠️ 어허 다시. 다 동의하도록 😏</p>
    <button onclick="closePopup()">확인</button>
  </div>
</div>

<!-- 이름 틀렸을 때 팝업 -->
<div id="namePopup" class="popup hidden">
  <div class="popup-content">
    <p id="nameErrorText"></p>
    <button onclick="closeNamePopup()">다시 입력</button>
  </div>
</div>

<script>
function next() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("contract").classList.remove("hidden");
}

function checkAll() {
  let checks = document.querySelectorAll(".chk");
  let allChecked = true;

  checks.forEach(chk => {
    if (!chk.checked) allChecked = false;
  });

  if (!allChecked) {
    document.getElementById("popup").classList.remove("hidden");
    return;
  }

  document.getElementById("contract").classList.add("hidden");
  document.getElementById("sign").classList.remove("hidden");
}

function closePopup() {
  document.getElementById("popup").classList.add("hidden");
}

function closeNamePopup() {
  document.getElementById("namePopup").classList.add("hidden");
}

function finish() {
  let name = document.getElementById("name").value.trim();

  if (name === "") {
    alert("이름을 입력하세요");
    return;
  }

  if (name !== "한송현") {
    document.getElementById("nameErrorText").innerText =
      "❌ 다시 써, 풉 😑";
    document.getElementById("namePopup").classList.remove("hidden");

    let input = document.getElementById("name");
    input.classList.add("shake");

    setTimeout(() => {
      input.classList.remove("shake");
    }, 300);

    return;
  }

  document.getElementById("sign").classList.add("hidden");
  document.getElementById("end").classList.remove("hidden");

  document.getElementById("result").innerText =
    name + " 너는 이제 공식 따까리 인증 ㅋㅋ 🎉";
}
</script>

</body>
</html>
